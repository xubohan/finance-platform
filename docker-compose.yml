services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${DB_USER:-finuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finpass}
      POSTGRES_DB: ${DB_NAME:-finterminal}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-finuser} -d ${DB_NAME:-finterminal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://finuser:finpass@db:5432/finterminal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENABLE_RESEARCH_APIS: ${ENABLE_RESEARCH_APIS:-false}
      ENABLE_AI_API: ${ENABLE_AI_API:-false}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai_service:8001}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  celery_worker:
    build: ./backend
    command: celery -A tasks.celery_app.celery_app worker --loglevel=info --concurrency=2
    profiles: ["experimental"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://finuser:finpass@db:5432/finterminal}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  ai_service:
    build: ./ai_service
    profiles: ["experimental"]
    environment:
      REDIS_URL: redis://redis:6379/3
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      redis:
        condition: service_started
    ports:
      - "8001:8001"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/market >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/market >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  pgdata:
